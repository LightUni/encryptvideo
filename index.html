<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CLASSIFIED — ACCESS RESTRICTED</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=Special+Elite&display=swap');

    :root {
      --red: #c0392b;
      --red-glow: #e74c3c;
      --amber: #d4a017;
      --amber-dim: #7a5c0a;
      --paper: #1a1208;
      --ink: #0a0a0a;
      --text: #c8b97a;
      --text-dim: #6b5a2e;
      --green: #2ecc71;
      --green-glow: #27ae60;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--ink);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg,
          transparent,
          transparent 2px,
          rgba(0, 0, 0, 0.18) 2px,
          rgba(0, 0, 0, 0.18) 4px);
      pointer-events: none;
      z-index: 100;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0, 0, 0, 0.85) 100%);
      pointer-events: none;
      z-index: 99;
    }

    .grain {
      position: fixed;
      inset: -50%;
      width: 200%;
      height: 200%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
      opacity: 0.07;
      pointer-events: none;
      z-index: 98;
      animation: grain 0.5s steps(1) infinite;
    }

    @keyframes grain {
      0% {
        transform: translate(0, 0);
      }

      25% {
        transform: translate(-2%, 1%);
      }

      50% {
        transform: translate(1%, -1%);
      }

      75% {
        transform: translate(-1%, 2%);
      }
    }

    .container {
      position: relative;
      z-index: 10;
      width: min(600px, 92vw);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .topbar {
      width: 100%;
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid var(--amber-dim);
      padding-bottom: 8px;
      margin-bottom: 28px;
      opacity: 0;
      animation: fadein 0.5s 0.2s forwards;
    }

    .topbar span {
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .blink {
      animation: blink 1.1s step-end infinite;
      color: var(--red);
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    .stamp {
      font-family: 'Bebas Neue';
      font-size: clamp(52px, 14vw, 88px);
      color: transparent;
      -webkit-text-stroke: 2.5px var(--red);
      letter-spacing: 12px;
      line-height: 1;
      text-align: center;
      opacity: 0;
      transform: rotate(-4deg) scale(1.08);
      animation: stampIn 0.35s 0.4s forwards;
      text-shadow: 0 0 40px rgba(192, 57, 43, 0.3);
    }

    @keyframes stampIn {
      to {
        opacity: 1;
        transform: rotate(-4deg) scale(1);
      }
    }

    .divider {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0 28px;
      opacity: 0;
      animation: fadein 0.5s 0.7s forwards;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--amber-dim);
    }

    .message {
      font-family: 'Special Elite';
      font-size: 13.5px;
      line-height: 1.9;
      text-align: center;
      max-width: 440px;
      opacity: 0;
      animation: fadein 0.5s 0.9s forwards;
    }

    .case-box {
      margin-top: 36px;
      width: 100%;
      border: 1px solid var(--amber-dim);
      border-top: 3px solid var(--amber);
      padding: 28px 32px 32px;
      position: relative;
      opacity: 0;
      animation: fadein 0.5s 1.1s forwards;
      background: rgba(212, 160, 23, 0.03);
    }

    .case-label {
      position: absolute;
      top: -11px;
      left: 20px;
      background: var(--ink);
      padding: 0 10px;
      font-size: 10px;
      letter-spacing: 4px;
      color: var(--amber);
    }

    .input-row {
      display: flex;
      width: 100%;
      margin-top: 8px;
    }

    .input-prefix {
      background: rgba(212, 160, 23, 0.1);
      border: 1px solid var(--amber-dim);
      border-right: none;
      padding: 12px 14px;
      font-size: 13px;
      color: var(--amber);
      letter-spacing: 2px;
    }

    #passInput {
      flex: 1;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid var(--amber-dim);
      border-left: none;
      color: var(--amber);
      font-size: 15px;
      padding: 12px 16px;
      outline: none;
      letter-spacing: 4px;
    }

    #submitBtn {
      margin-top: 18px;
      width: 100%;
      background: transparent;
      border: 1px solid var(--red);
      color: var(--red);
      font-family: 'Bebas Neue';
      font-size: 18px;
      letter-spacing: 6px;
      padding: 13px;
      cursor: pointer;
    }

    #submitBtn:hover {
      background: var(--red);
      color: white;
      box-shadow: 0 0 28px rgba(192, 57, 43, 0.5);
    }

    #status {
      margin-top: 14px;
      font-size: 11px;
      letter-spacing: 3px;
      text-align: center;
      min-height: 18px;
    }

    .status-error {
      color: var(--red);
    }

    .status-ok {
      color: var(--green);
    }

    #videoPanel {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      gap: 20px;
    }

    .access-granted {
      font-family: 'Bebas Neue';
      font-size: clamp(32px, 9vw, 56px);
      letter-spacing: 10px;
      color: var(--green);
      text-shadow: 0 0 30px rgba(46, 204, 113, 0.6);
    }

    .video-wrapper {
      width: 100%;
      border: 1px solid var(--green-glow);
      box-shadow: 0 0 40px rgba(46, 204, 113, 0.15);
      position: relative;
      padding-top: 56.25%;
      background: black;
    }

    .video-wrapper iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    @keyframes fadein {
      to {
        opacity: 1;
      }
    }
  </style>
</head>

<body>

  <div class="grain"></div>

  <div class="container" id="lockPanel">

    <div class="topbar">
      <span>CASE FILE // EYES ONLY</span>
      <span class="blink">● REC</span>
    </div>

    <div class="stamp">CLASSIFIED</div>

    <p class="message">
      This footage has been sealed by the investigation.<br>
      Enter clearance code.
    </p>

    <div class="case-box">

      <span class="case-label">Clearance Required</span>

      <div class="input-row">
        <div class="input-prefix">▶ KEY</div>

        <input id="passInput" type="text" placeholder="enter access code" autocomplete="off" spellcheck="false">

      </div>

      <button id="submitBtn" onclick="checkPassword()">
        AUTHENTICATE
      </button>

      <div id="status"></div>

    </div>
  </div>


  <div class="container" id="videoPanel">

    <div class="topbar">
      <span>EVIDENCE — UNLOCKED</span>
      <span style="color:var(--green)">● DECRYPTED</span>
    </div>

    <div class="access-granted">
      ACCESS GRANTED
    </div>

    <div class="video-wrapper">

      <iframe src="https://drive.google.com/file/d/1izNPZoNcMgg1BdVA5iArtW4lQVFR-yYt/view?usp=sharing" allow="autoplay" allowfullscreen>
      </iframe>

    </div>

  </div>


  <script>

    const PASSWORD = "PALINDROME";

    const input = document.getElementById('passInput');

    const status = document.getElementById('status');

    let attempts = 0;

    input.focus();

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') checkPassword();
    });

    function checkPassword() {

      const val = input.value.trim().toUpperCase();

      status.className = '';
      status.textContent = '';

      if (!val) {

        status.className = 'status-error';

        status.textContent = '// no input detected //';

        return;

      }

      if (val === PASSWORD) {

        status.className = 'status-ok';

        status.textContent = '// identity confirmed //';

        setTimeout(() => {

          document.getElementById('lockPanel').style.display = 'none';

          document.getElementById('videoPanel').style.display = 'flex';

        }, 700);

      }

      else {

        attempts++;

        input.value = '';

        status.className = 'status-error';

        status.textContent = '// access denied //';

        if (attempts >= 8) {

          input.disabled = true;

          status.textContent = '// too many attempts wait 20s //';

          setTimeout(() => {

            attempts = 0;

            input.disabled = false;

            status.textContent = '';

          }, 20000);

        }

      }

    }

  </script>

</body>

</html>
